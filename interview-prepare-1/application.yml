# =============================================================================
# Common Configuration - Applied to ALL Services
# =============================================================================
# This file is loaded first by all services, then overridden by service-specific
# configs in {service-name}/application.yml
# =============================================================================

# =============================================================================
# Distributed Tracing (Micrometer + OpenTelemetry + Zipkin)
# =============================================================================
management:
  tracing:
    sampling:
      probability: 1.0          # reduce to 0.1 for prod
    export:
      zipkin:
        endpoint: ${MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# =============================================================================
# Logging Pattern with Trace IDs
# =============================================================================
# Every log line will include: [traceId,spanId] for correlation across services
# Example: 2026-03-21 10:15:30.123 [thread] INFO [abc123,def456] c.m.service - msg
# =============================================================================
logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false
