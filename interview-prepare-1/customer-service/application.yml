# =============================================================================
# Customer Service - Remote Configuration (config-repo)
# =============================================================================
# Environment-specific config fetched from Git at runtime.
# Local application.yml keeps only: spring.application.name, spring.config.import, server.port
# =============================================================================

spring:
  # DataSource - credentials and URLs change per environment
  datasource:
    # driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:customer_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10

  # JPA - ddl-auto differs between local dev and production
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Actuator - fewer endpoints in prod
management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C
  zipkin:
    tracing:
      enpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,trace,gateway
  endpoint:
    health:
      show-details: always
