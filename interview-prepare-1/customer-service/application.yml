# =============================================================================
# Customer Service - Service-Specific Configuration (config-repo)
# =============================================================================
# This extends common config from interview-prepare-1/application.yml
# Only service-specific overrides are defined here
# =============================================================================

spring:
  # DataSource - credentials and URLs change per environment
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:customer_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10

  # JPA - ddl-auto differs between local dev and production
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
