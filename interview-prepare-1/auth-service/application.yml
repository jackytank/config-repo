# =============================================================================
# Auth Service - Service-Specific Configuration (config-repo)
# =============================================================================
# This extends common config from interview-prepare-1/application.yml
# Only service-specific overrides are defined here
# =============================================================================

spring:
  # DataSource - credentials and URLs change per environment
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10

  # JPA - ddl-auto differs between local dev and production
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT secrets - should never be committed to service repo
jwt:
  secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvck1hbnVsaWZlSW50ZXJ2aWV3}
  expiration-ms: 86400000 # 24h
  refresh-expiration-ms: 604800000 # 7d
